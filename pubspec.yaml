name: second_brain
description: A personal assistant app — tasks, notes, learning, entertainment, knowledge vault.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Database (type-safe SQLite)
  drift: ^2.18.0
  drift_flutter: ^0.2.1
  sqlite3_flutter_libs: ^0.5.24

  # Utilities
  path_provider: ^2.1.3
  path: ^1.9.0
  uuid: ^4.4.0
  intl: ^0.19.0

  # UI
  google_fonts: ^6.2.1
  flutter_slidable: ^3.1.0
  cached_network_image: ^3.3.1

  # Device features
  url_launcher: ^6.2.6
  share_plus: ^9.0.0
  image_picker: ^1.1.2
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.4

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
